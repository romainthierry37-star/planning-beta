const getMon=d=>{const r=new Date(d);const day=r.getDay();r.setDate(r.getDate()+(day===0?-6:1-day));r.setHours(0,0,0,0);return r;};

const frM=(y,m)=>new Date(y,m,1).toLocaleDateString("fr-FR",{month:"long",year:"numeric"});

const jouv=(d1,d2)=>{let d=new Date(d1),n=0;while(d<=d2){if(d.getDay()!==0)n++;d.setDate(d.getDate()+1);}return n;};

const parseH=(val,jn)=>{
  if(!val)return 0;
  const up=val.trim().toUpperCase();
  if(up==="OFF/FERIE"||up==="OFF/FÉRIÉ")return H_STD;
  const isA=["OFF","CONGE","CONGÉ","RTT","MALADIE","ABSENCE"].some(x=>up===x||up.startsWith(x+" "));
  const isFT=up.includes("FERIE TRAVAIL");
  if(isA&&!isFT)return 0;
  const mt=val.match(/(\d{1,2})[hH](\d{2})\s*[\/\-]\s*(\d{1,2})[hH](\d{2})/i);
  if(!mt)return 0;
  const a=parseInt(mt[1])*60+parseInt(mt[2]),b=parseInt(mt[3])*60+parseInt(mt[4]),diff=b-a;
  if(diff<=0)return 0;
  let pause=0;if(diff>360)pause=60;
  return Math.round((diff-pause)/60*10)/10;
};

const cBg=(val,ei)=>{
  if(!val)return"#fff";
  const up=val.trim().toUpperCase();
  if(up==="OFF")return"#f8f8f8";
  if(up.includes("FERIE TRAVAIL"))return"#fff0e0";
  if(up.includes("FERIE")||up.includes("FÉRIÉ"))return"#fff8e1";
  if(up.includes("CONGE")||up.includes("CONGÉ"))return"#e8f8f0";
  if(up==="RTT")return"#e8f0ff";
  if(up==="MALADIE")return"#fde8e8";
  return eb(ei);
};

const cTxt=val=>{
  if(!val)return"#ccc";
  const up=val.trim().toUpperCase();
  if(up==="OFF")return"#aaa";
  if(up.includes("FERIE TRAVAIL"))return"#c2410c";
  if(up.includes("FERIE")||up.includes("FÉRIÉ"))return"#b45309";
  if(up.includes("CONGE")||up.includes("CONGÉ"))return"#065f46";
  if(up==="RTT")return"#1e40af";
  if(up==="MALADIE")return"#991b1b";
  return"#1a1a2e";
};

const getMW=(y,m)=>{
  const weeks=[],last=new Date(y,m+1,0);
  let mon=getMon(new Date(y,m,1));
  while(mon<=last){
    const wd=getWD(mon).filter(d=>d.getMonth()===m&&!isWE(d));
    if(wd.length)weeks.push({mon:new Date(mon),wd});
    mon=addD(mon,7);
  }
  return weeks;
};

function App(){
  const today=new Date();
  const [session,setSession]=React.useState(null);
  const [sesOk,setSesOk]=React.useState(false);
  const [fbOk,setFbOk]=React.useState(false);
  const [sync,setSync]=React.useState("Connexion...");
  const [emps,setEmps]=React.useState([]);
  const [cells,setCells]=React.useState({});
  const [conges,setConges]=React.useState([]);
  const [view,setView]=React.useState("planning");
  const [mon,setMon]=React.useState(getMon(today));
  const [cgM,setCgM]=React.useState(today.getMonth());
  const [cgY,setCgY]=React.useState(today.getFullYear());
  const [recM,setRecM]=React.useState(today.getMonth());
  const [recY,setRecY]=React.useState(today.getFullYear());
  const [mob,setMob]=React.useState(window.innerWidth<=640);
  const [modal,setModal]=React.useState(null);
  const [mLieu,setMLieu]=React.useState("");
  const [mAbs,setMAbs]=React.useState("");
  const [mDeb,setMDeb]=React.useState("");
  const [mFin,setMFin]=React.useState("");
  const [mHS,setMHS]=React.useState(0);
  const [mFer,setMFer]=React.useState(false);
  const [cgEmp,setCgEmp]=React.useState("");
  const [cgTyp,setCgTyp]=React.useState("Conge");
  const [cgDeb,setCgDeb]=React.useState("");
  const [cgFin,setCgFin]=React.useState("");
  const [cgNot,setCgNot]=React.useState("");
  const [selS,setSelS]=React.useState(null);
  const [selE,setSelE]=React.useState(null);
  const [hovD,setHovD]=React.useState(null);
  const [newN,setNewN]=React.useState("");
  const [newH,setNewH]=React.useState(35);
  const [feedback,setFeedback]=React.useState("");
  const [fbSent,setFbSent]=React.useState(false);

  const isA=session&&session.role==="admin";
  const hSem=id=>{const e=emps.find(x=>x.id===id);return e&&e.hSem?e.hSem:35;};
  const userKey=session?session.user.toLowerCase():"";

  React.useEffect(()=>{const s=ldS();if(s)setSession(s);setSesOk(true);},[]);
  React.useEffect(()=>{const h=()=>setMob(window.innerWidth<=640);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  React.useEffect(()=>{if(window.__fbReady){setFbOk(true);return;}const h=()=>setFbOk(true);window.addEventListener("fbReady",h);return()=>window.removeEventListener("fbReady",h);},[]);

  React.useEffect(()=>{
    if(!fbOk||!session)return;
    const {db,onSnapshot,collection:col,doc}=window.__fb;
    const prefix=userKey+"/";
    const u1=onSnapshot(doc(db,"beta_planning",userKey+"_cells"),snap=>{if(snap.exists())setCells(snap.data().data||{});setSync("Synchronisé");},()=>setSync("Erreur"));
    const u2=onSnapshot(col(db,"beta_conges"),snap=>{
      try{setConges(snap.docs.filter(d=>d.id.startsWith(userKey+"_")).map(d=>{const x=d.data();return{id:d.id,empId:x.empId||"",type:x.type||"Conge",debut:x.debut||"",fin:x.fin||"",note:x.note||"",statut:x.statut||"valide",demandeLe:x.demandeLe||""};}).filter(g=>g.debut&&g.fin&&g.empId));}catch(e){}
    });
    const u3=onSnapshot(doc(db,"beta_planning",userKey+"_employees"),snap=>{
      if(snap.exists()&&snap.data().list){setEmps(snap.data().list);}
    });
    return()=>{u1();u2();u3();};
  },[fbOk,session,userKey]);

  const svC=async nc=>{if(!fbOk)return;const {db,doc,setDoc}=window.__fb;setSync("Sauvegarde...");try{await setDoc(doc(db,"beta_planning",userKey+"_cells"),{data:nc});setSync("Synchronisé");}catch(e){setSync("Erreur");}};
  const svE=async list=>{if(!fbOk)return;const {db,doc,setDoc}=window.__fb;try{await setDoc(doc(db,"beta_planning",userKey+"_employees"),{list});}catch(e){}};

  const addCgA=async()=>{
    if(!cgEmp||!cgDeb||!cgFin||!fbOk)return;
    const {db,doc,setDoc}=window.__fb;
    await setDoc(doc(db,"beta_conges",userKey+"_cg"+Date.now()),{empId:cgEmp,type:cgTyp,debut:cgDeb,fin:cgFin,note:cgNot,statut:"valide",demandeLe:new Date().toISOString()});
    setCgDeb("");setCgFin("");setCgNot("");setSelS(null);setSelE(null);
  };
  const delCg=async id=>{if(!fbOk)return;const {db,doc,deleteDoc}=window.__fb;try{await deleteDoc(doc(db,"beta_conges",id));}catch(e){}};
  const valCg=async id=>{if(!fbOk)return;const {db,doc,setDoc}=window.__fb;const cg=conges.find(g=>g.id===id);if(!cg)return;const {id:_,...data}=cg;try{await setDoc(doc(db,"beta_conges",id),{...data,statut:"valide"});}catch(e){}};
  const refCg=async id=>{if(!fbOk)return;const {db,doc,setDoc}=window.__fb;const cg=conges.find(g=>g.id===id);if(!cg)return;const {id:_,...data}=cg;try{await setDoc(doc(db,"beta_conges",id),{...data,statut:"refuse"});}catch(e){}};

  const sendFeedback=async()=>{
    if(!feedback.trim()||!fbOk)return;
    const {db,doc,setDoc}=window.__fb;
    try{await setDoc(doc(db,"beta_feedback","fb"+Date.now()),{user:session.user,secteur:session.secteur,message:feedback,date:new Date().toISOString()});setFbSent(true);setFeedback("");}catch(e){}
  };

  const getCV=(empId,dStr)=>{
    const c=(cells[empId]||{})[dStr];if(c&&c.val)return c;
    const cg=conges.find(g=>dStr>=g.debut&&dStr<=g.fin&&g.empId===empId&&g.statut==="valide");
    if(cg)return{val:cg.type,hsupp:0,fromCg:true};
    return null;
  };

  const wkStats=(empId,wDays)=>{
    const hs=hSem(empId);let h=0,s=0,hf=0;
    wDays.forEach(d=>{const cv=getCV(empId,dk(d));if(!cv)return;const up=(cv.val||"").toUpperCase(),hh=parseH(cv.val,d.getDay());if(up.includes("FERIE TRAVAIL"))hf+=Math.round(hh*1.25*10)/10;else if(up!=="OFF"){h+=hh;if(cv.hsupp)s+=Number(cv.hsupp);}});
    const tot=Math.round((h+s+hf)*10)/10;return{h:Math.round(h*10)/10,s,hf,tot,hs,diff:Math.round((tot-hs)*10)/10};
  };

  const mStats=(empId,y,m)=>{
    const hs=hSem(empId),hj=Math.round(hs/5*10)/10;
    const d=new Date(y,m,1);let hT=0,hS=0,hFB=0,hFM=0,cpJ=0,rJ=0,mJ=0,fJ=0,ftJ=0,jo=0;
    while(d.getMonth()===m){
      if(!isWE(d))jo++;
      const cv=getCV(empId,dk(d));
      if(cv){const up=(cv.val||"").toUpperCase(),hh=parseH(cv.val,d.getDay());if(up.includes("FERIE TRAVAIL")){ftJ++;hFB+=hh;hFM+=Math.round(hh*1.25*10)/10;}else if(up==="OFF/FERIE"||up==="OFF/FÉRIÉ"){fJ++;hT+=hj;}else if(up!=="OFF"){hT+=hh;if(cv.hsupp)hS+=Number(cv.hsupp);if(up.includes("CONGE")||up.includes("CONGÉ"))cpJ++;else if(up==="RTT")rJ++;else if(up==="MALADIE")mJ++;}}
      d.setDate(d.getDate()+1);
    }
    hT=Math.round(hT*10)/10;hFB=Math.round(hFB*10)/10;hFM=Math.round(hFM*10)/10;
    const nbS=Math.round(jo/6*10)/10,hTh=Math.round(nbS*hs*10)/10,hTot=Math.round((hT+hS+hFM)*10)/10,ecart=Math.round((hTot-hTh)*10)/10;
    return{hT,hS,hFB,hFM,hTh,hTot,ecart,cpJ,rJ,mJ,fJ,ftJ,jo,hs,hj};
  };

  const openM=(empId,date,dayIdx)=>{
    const k=dk(date),c=(cells[empId]||{})[k]||{},val=c.val||"";
    const up=val.toUpperCase(),isFT=up.includes("FERIE TRAVAIL");
    setMFer(isFT);
    setMAbs(isFT?"":( ABS.find(a=>up.startsWith(a.toUpperCase()))||""));
    setMLieu(isFT?"":( LIEUX.find(l=>up.startsWith(l.toUpperCase()))||""));
    const mt=val.match(/(\d{1,2})[hH](\d{2})\s*[\/\-]\s*(\d{1,2})[hH](\d{2})/i);
    setMDeb(mt?mt[1]+"h"+mt[2]:"");setMFin(mt?mt[3]+"h"+mt[4]:"");
    setMHS(c.hsupp||0);setModal({empId,date,k,dayIdx});
  };

  const svM=async()=>{
    if(!modal)return;const {empId,k}=modal;let val="";
    if(mFer&&mDeb&&mFin)val="Ferie travaille "+mDeb+"/"+mFin;
    else if(mAbs)val=mAbs;
    else if(mDeb&&mFin)val=mLieu?(mLieu+" "+mDeb+"/"+mFin):(mDeb+"/"+mFin);
    else if(mLieu)val=mLieu;
    const nc={...cells,[empId]:{...(cells[empId]||{})}};
    if(val||Number(mHS)>0)nc[empId][k]={val,hsupp:Number(mHS)||0};else delete nc[empId][k];
    setCells(nc);await svC(nc);setModal(null);
  };

  const clM=async()=>{
    if(!modal)return;const {empId,k}=modal;
    const nc={...cells,[empId]:{...(cells[empId]||{})}};
    delete nc[empId][k];setCells(nc);await svC(nc);
    setMLieu("");setMAbs("");setMDeb("");setMFin("");setMHS(0);setMFer(false);setModal(null);
  };

  const addE=()=>{if(!newN.trim())return;const l=[...emps,{id:"e"+Date.now(),name:newN.trim(),hSem:Number(newH)||35}];setEmps(l);svE(l);setNewN("");setNewH(35);};

  const expR=()=>{
    const sep="============================================================";
    let txt=sep+"\n  COMPTE RENDU - "+frM(recY,recM).toUpperCase()+"\n"+sep+"\n\n";
    emps.forEach(emp=>{
      const s=mStats(emp.id,recY,recM);
      txt+="----\n  "+emp.name.toUpperCase()+" (contrat "+s.hs+"h/sem)\n----\n";
      txt+="  Theorique : "+s.hTh+"h\n  Travaillees: "+s.hT+"h\n";
      if(s.hS>0)txt+="  H.supp   : +"+s.hS+"h\n";
      if(s.ftJ>0)txt+="  Feries   : "+s.ftJ+"j - "+s.hFB+"h x1.25="+s.hFM+"h\n";
      txt+="  TOTAL    : "+s.hTot+"h\n  Ecart    : "+(s.ecart===0?"Parfait":(s.ecart>0?"+"+s.ecart+"h":s.ecart+"h"))+"\n";
      txt+="  CP:"+s.cpJ+"j RTT:"+s.rJ+"j Maladie:"+s.mJ+"j\n\n";
